<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repo Summarizer AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="glow-bg"></div>

  <div class="container">
    <header>
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#7c3aed"/><stop offset="100%" style="stop-color:#06b6d4"/></linearGradient></defs>
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
        <h1>Repo Summarizer <span class="gradient-text">AI</span></h1>
      </div>
      <p class="subtitle">Paste a GitHub repo URL — get an instant AI-powered breakdown</p>
    </header>

    <form id="form">
      <div class="input-group">
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <input type="url" id="repoUrl" placeholder="https://github.com/owner/repo" required autocomplete="off">
        </div>
        <button type="submit" id="btn">
          <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          <span>Summarize</span>
        </button>
      </div>
    </form>

    <div class="examples">
      <span class="examples-label">Try:</span>
      <button class="example-btn" data-url="https://github.com/facebook/react">facebook/react</button>
      <button class="example-btn" data-url="https://github.com/langchain-ai/langgraph">langchain-ai/langgraph</button>
      <button class="example-btn" data-url="https://github.com/expressjs/express">expressjs/express</button>
    </div>

    <div id="loading" class="hidden">
      <div class="loader">
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
      </div>
      <p class="loading-text">Fetching repo data & analyzing with AI...</p>
      <div class="loading-steps">
        <span class="step active" id="step1">Fetching metadata</span>
        <span class="step" id="step2">Reading files</span>
        <span class="step" id="step3">AI analysis</span>
      </div>
    </div>

    <div id="error" class="hidden"></div>

    <div id="result" class="hidden">
      <!-- Hero card -->
      <div class="card hero-card animate-in" style="--delay: 0">
        <div class="hero-top">
          <div>
            <h2 id="repoName"></h2>
            <div class="meta">
              <span class="badge language" id="language"></span>
              <span class="badge complexity" id="complexity"></span>
              <span class="stars" id="stars"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Purpose -->
      <div class="card animate-in" style="--delay: 1">
        <div class="card-header">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          <h3>Purpose</h3>
        </div>
        <p id="purpose"></p>
      </div>

      <!-- Architecture -->
      <div class="card animate-in" style="--delay: 2">
        <div class="card-header">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <h3>Architecture</h3>
        </div>
        <p id="architecture"></p>
      </div>

      <!-- Tech Stack -->
      <div class="card animate-in" style="--delay: 3">
        <div class="card-header">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          <h3>Tech Stack</h3>
        </div>
        <div id="techStack" class="tags"></div>
      </div>

      <!-- Key Features -->
      <div class="card animate-in" style="--delay: 4">
        <div class="card-header">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <h3>Key Features</h3>
        </div>
        <ul id="keyFeatures"></ul>
      </div>
    </div>

    <footer>
      <p>Built with Node.js + Express + AI</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
